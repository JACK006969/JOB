<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolkata Job Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="container">
            <h1><i class="fas fa-briefcase"></i> Kolkata Job Portal</h1>
            <p>Find your dream job with AI-powered insights</p>
        </div>
    </div>

    <div class="container">
        <!-- Search & Filters -->
        <div class="controls-bar">
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Job title (e.g., Digital Marketing)" value="Digital Marketing">
                <input type="text" id="locationInput" placeholder="Location" value="Kolkata">
                <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
                <button id="aiSearchBtn" class="ai-btn"><i class="fas fa-robot"></i> Ask AI</button>
            </div>
            
            <!-- NEW FILTERS -->
            <div class="filters-section">
                <div class="filter-group">
                    <label><i class="fas fa-clock"></i> Job Type:</label>
                    <select id="jobTypeFilter">
                        <option value="fulltime,parttime,contract">All Types</option>
                        <option value="fulltime">Full Time</option>
                        <option value="parttime">Part Time</option>
                        <option value="contract">Contract</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-home"></i> Work Mode:</label>
                    <select id="remoteFilter">
                        <option value="false">On-site / Hybrid</option>
                        <option value="true">Remote / WFH</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-user-graduate"></i> Experience:</label>
                    <select id="experienceFilter">
                        <option value="fresher">Fresher / Entry Level</option>
                        <option value="1-3">1 - 3 Years</option>
                        <option value="4+">4+ Years (Senior)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- AI Summary Box -->
        <div id="aiSummarySection" class="ai-summary-section" style="display: none;">
            <div class="ai-summary-header">
                <h2><i class="fas fa-robot"></i> AI Job Analysis</h2>
                <button id="closeAiBtn" class="close-ai-btn"><i class="fas fa-times"></i></button>
            </div>
            <div id="aiSummaryContent" class="ai-summary-content"></div>
        </div>

        <!-- Jobs Grid -->
        <div class="jobs-grid" id="jobsGrid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <button id="prevBtn" disabled><i class="fas fa-chevron-left"></i> Previous</button>
            <span id="pageInfo">Page 1</span>
            <button id="nextBtn">Next <i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
