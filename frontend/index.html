<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolkata Job Portal | Fresher Jobs</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- ============================================ -->
    <!-- HEADER -->
    <!-- ============================================ -->
    <div class="header">
        <div class="container">
            <h1><i class="fas fa-briefcase"></i> Kolkata Job Portal</h1>
            <p>Real fresher jobs for BBA Digital Marketing graduates</p>
            <div class="stats-row">
                <div class="stat-card"><i class="fas fa-building"></i> 50+ Companies</div>
                <div class="stat-card"><i class="fas fa-rupee-sign"></i> Fresher Friendly</div>
                <div class="stat-card"><i class="fas fa-map-marker-alt"></i> Kolkata</div>
                <div class="stat-card"><i class="fas fa-database"></i> Real Jobs</div>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- MAIN CONTENT -->
    <!-- ============================================ -->
    <div class="container">
        <!-- Controls Bar -->
        <div class="controls-bar">
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Search any job... (e.g., digital marketing, software engineer)" value="digital marketing">
                <select id="locationSelect">
                    <option value="Kolkata">Kolkata</option>
                    <option value="Bangalore">Bangalore</option>
                    <option value="Mumbai">Mumbai</option>
                    <option value="Delhi">Delhi NCR</option>
                    <option value="Hyderabad">Hyderabad</option>
                    <option value="Pune">Pune</option>
                    <option value="Chennai">Chennai</option>
                </select>
                <select id="sourceSelect">
                    <option value="all">All Sources (4 APIs)</option>
                    <option value="jobdatalake">🔥 JobDataLake (Primary)</option>
                    <option value="jsearch">JSearch (Indeed/LinkedIn/Glassdoor)</option>
                    <option value="prlabs">PR Labs</option>
                    <option value="indeed">Indeed RSS</option>
                </select>
                <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
            </div>
            <div class="sort-section">
                <div class="sort-group">
                    <i class="fas fa-sort-amount-down-alt"></i>
                    <label>Sort by:</label>
                    <select id="sortSelect">
                        <option value="default">Latest First</option>
                        <option value="salary">Highest Salary</option>
                    </select>
                </div>
                <div class="stats" id="stats">
                    <span><i class="fas fa-briefcase"></i> <span id="jobCount">0</span> jobs</span>
                    <span><i class="fas fa-clock"></i> <span id="lastUpdate">--</span></span>
                </div>
            </div>
        </div>

        <!-- Jobs Grid -->
        <div class="jobs-grid" id="jobsGrid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading jobs from JobDataLake, JSearch, PR Labs & Indeed...
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- FOOTER -->
    <!-- ============================================ -->
    <footer>
        <p>Powered by JobDataLake, JSearch, PR Labs & Indeed RSS | Backend: Node.js | Deploy on Render</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
